name: Update Homepage Sitemap

on:
  push:
    branches:
      - main
    paths:
      - 'pdfkey/*.html'
      - 'scripts/update-sitemap-homepage.py'

jobs:
  update-sitemap:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update sitemap
        run: |
          python3 scripts/update-sitemap-homepage.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet pdfkey/sitemap.xml; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdfkey/sitemap.xml
          git commit -m "chore: auto-update homepage sitemap ($(date '+%Y-%m-%d')) [skip ci]"
          git push
